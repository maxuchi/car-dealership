<div class="container py-5">
  <h1 class="mb-4">Our Cars</h1>

  <div class="row mb-4">

    <div class="col-md-6">
      <select
  class="form-select"
  [(ngModel)]="selectedBrand"
  (change)="applyFilters()"
>
  <option value="All">All Brands</option>
  <option value="BMW">BMW</option>
  <option value="Audi">Audi</option>
  <option value="Mercedes">Mercedes</option>
</select>
    </div>

    <div class="col-md-6">
      <select
  class="form-select"
  [(ngModel)]="selectedPrice"
  (change)="applyFilters()"
>
  <option value="All">All Prices</option>
  <option value="Under">Under $100,000</option>
  <option value="Over">Over $100,000</option>
</select>
    </div>

  </div>

  <div class="row">
<div
  class="col-md-4 mb-4"
  *ngFor="let car of filteredCars"
  data-aos="zoom-in"
>
    >
      <div class="card">

        <img
          [src]="car.image"
          class="card-img-top"
          [alt]="car.name"
        />

        <div class="card-body">

          <h5 class="card-title">
            {{ car.name }}
          </h5>

          <p class="card-text">
            ${{ car.price }}
          </p>

          <a
            class="btn btn-primary"
            [routerLink]="['/cars', car.id]"
          >
            View Details
          </a>

        </div>

      </div>
    </div>

  </div>
</div>
