<div class="container py-5">

  <h1 class="text-center fw-bold mb-5">
    Our Premium Collection
  </h1>


  <!-- FILTERS -->

  <div class="row mb-5">

    <!-- BRAND FILTER -->

    <div class="col-md-6 mb-3">

      <select
        class="form-select"
        [ngModel]="selectedBrand()"
        (ngModelChange)="selectedBrand.set($event)">

        <option value="All">
          All Brands
        </option>

        <option value="BMW">
          BMW
        </option>

        <option value="Audi">
          Audi
        </option>

        <option value="Mercedes">
          Mercedes
        </option>

      </select>

    </div>


    <!-- PRICE FILTER -->

    <div class="col-md-6 mb-3">

      <select
        class="form-select"
        [ngModel]="selectedPrice()"
        (ngModelChange)="selectedPrice.set($event)">

        <option value="All">
          All Prices
        </option>

        <option value="Under">
          Under $100,000
        </option>

        <option value="Over">
          Over $100,000
        </option>

      </select>

    </div>

  </div>


  <!-- CARS -->

  <div class="row g-4">

    @for (car of filteredCars(); track car.id) {

      <div
        class="col-lg-4 col-md-6"
        data-aos="zoom-in">

        <div class="card h-100">

          <img
            [src]="car.image"
            [alt]="car.name"
            class="card-img-top">


          <div class="card-body d-flex flex-column">

            <h4 class="card-title">

              {{ car.name }}

            </h4>


            <div class="mb-3">

              <span class="badge bg-success me-2">

                {{ car.year }}

              </span>


              <span class="badge bg-dark">

                {{ car.engine }}

              </span>

            </div>


            <p class="text-muted">

              {{ car.description }}

            </p>


            <h3 class="card-text">

              ${{ car.price }}

            </h3>


            <div class="mt-auto">

              <a
                class="btn btn-primary w-100"
                [routerLink]="['/details', car.id]">

                View Details

                <i class="bi bi-arrow-right ms-2"></i>

              </a>

            </div>

          </div>

        </div>

      </div>

    } @empty {

      <div class="col-12">

        <div class="alert alert-warning text-center">

          No vehicles found matching the selected filters.

        </div>

      </div>

    }

  </div>

</div>
